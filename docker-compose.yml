services:
  postgres:
    image: postgres:15.6-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env.dev
    environment:
      - DB_HOST=postgres
      - DB_PORT=${DB_PORT}
      - NODE_ENV=development
      - PORT=${REACT_APP_API_PORT}
    ports:
      - "${REACT_APP_API_PORT}:${REACT_APP_API_PORT}"
    depends_on:
      postgres:
        condition: service_healthy
    tty: true
    stdin_open: true
    command: sh -c "npm install && npm run start:dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    # env_file:
    #   - .env.dev
    environment:
      - WDS_SOCKET_PORT=0
      - BROWSER=none
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=false
      - WDS_SOCKET_HOST=localhost
    ports:
      - "3000:3000"
    depends_on:
      - backend
    tty: true
    stdin_open: true

volumes:
  postgres_data: