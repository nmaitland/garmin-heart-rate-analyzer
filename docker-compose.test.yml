services:
  postgres:
    image: postgres:15.6-alpine
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        sleep 5
        psql -U postgres -c 'CREATE DATABASE garmin_heart_rate_test;'
        wait
      "

  backend:
    container_name: backend_test
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend/src:/app/src
      - ./backend/test:/app/test
      - ./backend/coverage:/app/coverage
    env_file:
      - .env.test
    environment:
      - NODE_ENV=test
      - DB_PORT=5432
      - CI=true      
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm run test:cov --verbose"    

  frontend:
    container_name: frontend_test
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/coverage:/app/coverage
    env_file:
      - .env.test
    environment:
      - NODE_ENV=test
    depends_on:
      - backend
    command: sh -c "npm run test:coverage --verbose"

volumes:
  postgres_data: