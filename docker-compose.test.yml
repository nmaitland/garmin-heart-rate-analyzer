services:
  postgres:
    image: postgres:15.6-alpine
    env_file:
      - .env.test
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      bash -c "
        docker-entrypoint.sh postgres &
        sleep 5
        psql -U postgres -c 'CREATE DATABASE garmin_heart_rate_test;'
        wait
      "

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - .env.test
    environment:
      - NODE_ENV=test
      - DB_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    command: sh -c "npm install --force && npm run test:e2e"    

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    volumes:
      - ./frontend:/app
      - /app/node_modules
    env_file:
      - .env.test
    environment:
      - NODE_ENV=test
    depends_on:
      - backend
    command: sh -c "npm install --force && npm run test"

volumes:
  postgres_data: